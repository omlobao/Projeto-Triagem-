{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login — Sistema de Triagem Hospitalar SENAI">
  <title>Login — Triagem SENAI</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <img src="{% static 'img/senai_logo.png' %}" alt="SENAI" class="login-logo">
          <h1>Sistema de Triagem</h1>
          <p>Acesse sua conta para continuar</p>
        </div>

        {% if form.errors %}
        <div class="login-error">
          <i class="fas fa-exclamation-circle"></i>
          Usuário ou senha inválidos. Tente novamente.
        </div>
        {% endif %}

        <form method="post" class="login-form" id="login-form">
          {% csrf_token %}
          <div class="form-group">
            <label for="id_username">Usuário</label>
            <i class="fas fa-user input-icon"></i>
            <input type="text" 
                   name="username" 
                   id="id_username" 
                   placeholder="Digite seu usuário" 
                   autofocus 
                   required>
          </div>
          <div class="form-group">
            <label for="id_password">Senha</label>
            <i class="fas fa-lock input-icon"></i>
            <input type="password" 
                   name="password" 
                   id="id_password" 
                   placeholder="Digite sua senha" 
                   required>
          </div>
          <button type="submit" class="btn btn-primary" id="btn-login">
            <i class="fas fa-sign-in-alt"></i>
            Entrar
          </button>
        </form>

        <p class="text-center text-muted text-sm mt-3">
          SENAI — Serviço Nacional de Aprendizagem Industrial
        </p>
      </div>
    </div>
  </div>
</body>
</html>
